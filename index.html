<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Kun Master - The Awakening</title>
    
    <!-- Nhúng Font Pixel chuẩn từ Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        /* === TÀI NGUYÊN MÀU SẮC & BIẾN === */
        :root {
            --kun-green: #2ecc71; 
            --kun-dark: #1a1a1a;
            --kun-gold: #f1c40f;
            --kun-shadow: #000000;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--kun-dark);
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden; 
        }

        /* Hiệu ứng màn hình Tivi CRT sọc ngang */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none; 
        }

        /* --- HÌNH NỀN TỐI ƯU CHO MÁY TÍNH & ĐIỆN THOẠI --- */
        .bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            
            /* Link ảnh mới của bạn */
            background-image: url('https://img.itch.zone/aW1nLzIwMTQwMzA5LnBuZw==/original/8akAhD.png'); 
            
            /* Phủ kín màn hình, luôn giữ tâm ảnh ở giữa */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* LƯU Ý QUAN TRỌNG: Ép pixelate để ảnh nét căng không bị mờ */
            image-rendering: pixelated; 
            image-rendering: crisp-edges;
            
            z-index: -1;
            transition: filter 1.5s ease;
        }

        /* --- 1. MÀN HÌNH LOADING --- */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
            background-color: rgba(0, 0, 0, 0.6); /* Tối nền để chữ dễ đọc */
            transition: opacity 1s ease, visibility 1s;
        }

        .loading-box {
            border: 4px solid #fff;
            padding: 4px;
            width: 300px; /* Độ rộng gốc trên PC */
            max-width: 80%; /* Không bao giờ vượt quá 80% màn hình đt */
            background: #000;
            box-shadow: 4px 4px 0 var(--kun-shadow);
        }

        .loading-bar {
            height: 20px;
            background-color: var(--kun-green);
            width: 0%;
            animation: fillBar 3s steps(15) forwards; 
        }

        @keyframes fillBar {
            0% { width: 0%; }
            50% { width: 60%; }
            80% { width: 80%; }
            100% { width: 100%; }
        }

        .loading-text {
            margin-top: 20px;
            font-size: 0.8rem;
            color: var(--kun-gold);
            text-shadow: 2px 2px 0 var(--kun-shadow);
            letter-spacing: 2px;
            text-align: center;
        }

        .blink {
            animation: blinking 1s infinite;
        }
        @keyframes blinking { 50% { opacity: 0; } }

        /* --- 2. TRANG CHÍNH CỦA GAME --- */
        #main-content {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.5s ease;
        }

        #main-content.visible {
            opacity: 1;
            visibility: visible;
        }

        .menu-board {
            background: rgba(0, 0, 0, 0.85);
            border: 4px solid var(--kun-gold);
            padding: 40px;
            text-align: center;
            box-shadow: 
                8px 8px 0 rgba(0,0,0,0.9),
                inset 0 0 20px rgba(241, 196, 15, 0.2);
            animation: floating 3s ease-in-out infinite;
            width: 80%;
            max-width: 500px; /* Giới hạn độ to trên PC */
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .pixel-title {
            font-size: 3.5rem;
            color: #fff;
            margin: 0 0 15px 0;
            text-shadow: 
                4px 4px 0 var(--kun-green),
                8px 8px 0 var(--kun-shadow);
            line-height: 1.2;
        }

        .pixel-subtitle {
            font-size: 0.8rem;
            color: var(--kun-gold);
            margin-bottom: 40px;
            letter-spacing: 1px;
            line-height: 1.5;
        }

        .btn-start {
            background-color: var(--kun-green);
            color: #fff;
            border: 4px solid #fff;
            padding: 15px 30px;
            font-family: 'Press Start 2P', cursive;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 8px 0 #1e8449; 
            transition: all 0.1s;
        }

        .btn-start:hover {
            background-color: #27ae60;
            transform: translateY(2px);
            box-shadow: 0 6px 0 #1e8449;
        }

        .btn-start:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #1e8449; 
            background-color: var(--kun-gold);
        }

        .blur-bg {
            filter: blur(5px) brightness(0.5); /* Tăng độ mờ nền để chữ rõ hơn */
        }

        /* --- TỐI ƯU HÓA CHO ĐIỆN THOẠI (MOBILE RESPONSIVE) --- */
        @media (max-width: 768px) {
            .menu-board {
                padding: 25px 15px;
                width: 85%;
            }
            .pixel-title {
                font-size: 2.2rem; /* Chữ nhỏ lại trên đt */
                text-shadow: 
                    3px 3px 0 var(--kun-green),
                    6px 6px 0 var(--kun-shadow);
            }
            .pixel-subtitle {
                font-size: 0.6rem;
                margin-bottom: 30px;
            }
            .btn-start {
                padding: 12px 20px;
                font-size: 0.8rem;
            }
            .loading-text {
                font-size: 0.6rem;
            }
        }
    </style>
</head>
<body>

    <!-- Hình nền chung & Đường sọc CRT -->
    <div class="bg-layer" id="game-bg"></div>
    <div class="scanlines"></div>

    <!-- Màn hình Loading -->
    <div id="loading-screen">
        <div class="loading-box">
            <div class="loading-bar"></div>
        </div>
        <p class="loading-text">LOADING DUNGEON<span class="blink">...</span></p>
    </div>

    <!-- Trang Menu Chính -->
    <div id="main-content">
        <div class="menu-board">
            <h1 class="pixel-title">KUN<br>MASTER</h1>
            <p class="pixel-subtitle">- THE DUNGEON AWAKENING -</p>
            <button class="btn-start" onclick="alert('Đang kết nối vào máy chủ...')">PRESS START</button>
        </div>
    </div>

    <!-- KỊCH BẢN JAVASCRIPT -->
    <script>
        window.addEventListener('load', () => {
            const loadingScreen = document.getElementById('loading-screen');
            const mainContent = document.getElementById('main-content');
            const gameBg = document.getElementById('game-bg');

            setTimeout(() => {
                loadingScreen.style.opacity = '0';
                
                gameBg.classList.add('blur-bg');

                setTimeout(() => {
                    loadingScreen.style.visibility = 'hidden';
                    mainContent.classList.add('visible');
                    document.body.style.overflow = 'auto'; 
                }, 1000); 
            }, 3000); 
        });
    </script>
</body>
</html>
