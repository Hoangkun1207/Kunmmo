<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Game - Loading...</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Màn hình Loading -->
    <div id="loading-screen">
        <div class="pixel-loader"></div>
        <p class="loading-text">LOADING PIXELS...</p>
    </div>

    <!-- Nội dung trang Giới thiệu (Ẩn lúc đầu) -->
    <div id="main-content" class="hidden">
        <nav>
            <h1 class="logo">KUN GAME</h1>
        </nav>
        
        <section class="hero">
            <div class="hero-content">
                <h2 class="glitch" data-text="WELCOME TO THE PIXEL WORLD">WELCOME TO THE PIXEL WORLD</h2>
                <p>Khám phá thế giới 8-bit đầy màu sắc và kịch tính.</p>
                <button class="btn-start">BẮT ĐẦU NGAY</button>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
