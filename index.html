<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Game - Loading...</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Màn hình Loading -->
    <div id="loading-screen">
        <div class="pixel-loader"></div>
        <p class="loading-text">LOADING PIXELS...</p>
    </div>

    <!-- Nội dung trang Giới thiệu (Ẩn lúc đầu) -->
    <div id="main-content" class="hidden">
        <nav>
            <h1 class="logo">KUN GAME</h1>
        </nav>
        
<section class="hero">
    <div class="hero-content">
        <!-- Tên thương hiệu mới của bạn -->
        <h1 class="pixel-title">PIXEL KUN MASTER</h1>
        <p class="pixel-subtitle">CHÀO MỪNG ĐẾN VỚI THẾ GIỚI PIXEL</p>
        <button class="btn-start">BẮT ĐẦU NGAY</button>
    </div>
</section>

    <script src="script.js"></script>
</body>
</html>
